# Render Blueprint — деплой backend + frontend одной командой.
# Инструкция:
# 1. Зайди на https://render.com → New → Blueprint
# 2. Подключи репозиторий https://github.com/Donik-ux/blink
# 3. Render прочитает этот файл и создаст оба сервиса
# 4. Заполни секреты помеченные sync: false (MongoDB URI, JWT)
#
# Бесплатный план Render: backend засыпает после 15 мин неактивности (первый запрос ~30с)

services:
  # ────────────────────────────────────────────────
  # Backend: Express + Socket.io
  # ────────────────────────────────────────────────
  - type: web
    name: blink-server
    runtime: node
    plan: free
    region: frankfurt
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # вставь свой URI из MongoDB Atlas в дашборде Render
      - key: REDIS_URL
        sync: false   # опционально, можно оставить пустым
      - key: JWT_SECRET
        generateValue: true   # Render сгенерирует случайный
      - key: JWT_REFRESH_SECRET
        generateValue: true

  # ────────────────────────────────────────────────
  # Frontend: Vite static build
  # ────────────────────────────────────────────────
  - type: web
    name: blink-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      # URL backend подставится автоматически из ссылки на сервис
      - key: VITE_API_URL
        fromService:
          type: web
          name: blink-server
          property: host
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: blink-server
          property: host
    headers:
      # PWA service worker должен иметь правильный Content-Type
      - path: /sw.js
        name: Service-Worker-Allowed
        value: /
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /manifest.webmanifest
        name: Content-Type
        value: application/manifest+json
    routes:
      # SPA fallback — все маршруты ведут на index.html
      - type: rewrite
        source: /*
        destination: /index.html
